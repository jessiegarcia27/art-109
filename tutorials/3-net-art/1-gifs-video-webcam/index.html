<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎥</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/woCIpMyyjxw?controls=1&autoplay=1&mute=1&loop=1&playlist=woCIpMyyjxw"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
        <img src="media/flipping-penguin.gif" alt="flipping-penguin" class="flipping-penguin">
        <div class="penguin-div">
            <p>PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN
                PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN PENGUIN
                PENGUIN </p>
            <img src="media/club-penguin.gif" alt="Club Penguin" class="club-penguin">
        </div>
        <!-- autoplay video -->
        <video autoplay muted loop>
            <source src="media/IMG_6172_1.mp4" type="video/mp4">
        </video>
        <!-- hover videos -->
        <video class="hover-video" muted loop>
            <source src="media/IMG_6172_1.mp4" type="video/mp4">
        </video>
        <video class="hover-video" muted loop>
            <source src="media/IMG_6172_1.mp4" type="video/mp4">
        </video>
        <!-- click on play videos -->
        <video class="click-video" muted loop>
            <source src="media/IMG_6172_1.mp4" type="video/mp4">
        </video>

        <video id="webcam" autoplay playsinline></video>

    </main>

    <script src="js/video.js"></script>
    <script src="js/webcam.js"></script>

</body>

</html>
