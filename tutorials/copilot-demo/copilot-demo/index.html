<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Themed Social Media Feed</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Social Media Feed</h1>
    </header>
    <main>
        <section id="feed">
            <article class="post">
                <img src="images/sample-image1.jpg" alt="Post Image 1" class="responsive">
                <h2>User Name</h2>
                <p>This is a sample post content. It can be a short description or a status update.</p>
            </article>
            <article class="post">
                <img src="images/sample-image2.jpg" alt="Post Image 2" class="responsive">
                <h2>User Name</h2>
                <p>This is another sample post content. Engaging and interesting updates go here.</p>
            </article>
            <!-- More posts can be added here -->
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Social Media Feed. All rights reserved.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
